# SD Macross Valkyrie VF-1J scene.
#
# Source: poly.pizza (CC-BY — fill in author/URL per the model's page).
# The OBJ's usemtl groups resolve against materials.mtl via the mtl=
# key below; each material group becomes its own scene_mesh so the
# authentic multi-color paint scheme renders correctly. The [material.paint]
# fallback applies to any group whose usemtl name isn't in the MTL.
#
# ~1362 triangles, 6 material groups. Fits comfortably in the CPU renderer
# with bounding-sphere culling. GPU runs flat-shaded via the Triangle SSBO.

[render]
ambient = 0.22

[camera]
position = 2.8, 2.4, 4.5
look_at  = 0.0, 0.6, 0.0

[light.key]
direction = 0.6, 0.9, 0.3
intensity = 0.75

[light.fill]
direction = -0.6, 0.4, -0.5
intensity = 0.35

# ---------------- materials ----------------

[material.ground]
albedo    = 70, 85, 70
albedo2   = 45, 55, 45
tex_kind  = checker
tex_scale = 1.5

[material.paint]
albedo       = 220, 220, 230
reflectivity = 0.08

# ---------------- ground ----------------

[plane.ground]
point    = 0, 0, 0
normal   = 0, 1, 0
material = ground

# ---------------- Valkyrie ----------------

[mesh.valkyrie]
file     = valkyrie.obj
mtl      = valkyrie.mtl
material = paint
offset   = 0, 0.8, 0
scale    = 4.0
