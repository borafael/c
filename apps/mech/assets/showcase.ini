# Procedural-mesh showcase. Three generated meshes side by side on a
# checkered floor. TAB between CPU (smooth shading via per-vertex normals)
# and GPU (flat-shaded, face normals) to see the difference.

[render]
ambient = 0.22

[camera]
position = 0, 3.2, 7.5
look_at  = 0, 1.0, 0

[light.key]
direction = 0.5, 0.9, 0.3
intensity = 0.75

[light.fill]
direction = -0.6, 0.4, -0.5
intensity = 0.35

# ---------------- materials ----------------

[material.ground]
albedo    = 70, 85, 70
albedo2   = 45, 55, 45
tex_kind  = checker
tex_scale = 1.5

[material.gold]
albedo       = 220, 180, 60
reflectivity = 0.15

[material.red]
albedo    = 200, 40, 40
albedo2   = 120, 20, 20
tex_kind  = cells
tex_scale = 0.25

[material.cyan_mirror]
albedo       = 100, 200, 220
reflectivity = 0.5

# ---------------- ground ----------------

[plane.ground]
point    = 0, 0, 0
normal   = 0, 1, 0
material = ground

# ---------------- meshes ----------------

[mesh.sphere]
file     = sphere.obj
material = gold
offset   = -2.6, 1.1, 0
scale    = 1.0

[mesh.icosphere]
file     = icosphere.obj
material = red
offset   = 0, 1.1, 0
scale    = 1.0

[mesh.torus]
file     = torus.obj
material = cyan_mirror
offset   = 2.6, 0.9, 0
rotation = 70, 0, 0
scale    = 0.9
