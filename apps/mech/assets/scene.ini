# Sample mech scene — everything authored in plain text.
# Parts are instances of cube.obj with per-part offset / rotation / scale
# baked into the vertices at load time.

[render]
ambient = 0.25

[camera]
position = 5.0, 3.5, 7.0
look_at  = 0.0, 2.0, 0.0

[light.key]
direction = 0.5, 0.9, 0.3
intensity = 0.75

[light.fill]
direction = -0.6, 0.4, -0.5
intensity = 0.35

# ---------------- materials ----------------

[material.ground]
albedo    = 70, 85, 70
albedo2   = 45, 55, 45
tex_kind  = checker
tex_scale = 1.5

[material.armor]
albedo       = 150, 160, 180
reflectivity = 0.15

[material.red]
albedo    = 200, 40, 40
albedo2   = 120, 20, 20
tex_kind  = cells
tex_scale = 0.3

[material.dark]
albedo       = 40, 45, 55
reflectivity = 0.25

# ---------------- ground ----------------

[plane.ground]
point    = 0, 0, 0
normal   = 0, 1, 0
material = ground

# ---------------- mech parts ----------------

[mesh.torso]
file     = cube.obj
material = armor
offset   = 0, 2.2, 0
scale    = 1.4, 1.8, 0.9

[mesh.head]
file     = cube.obj
material = red
offset   = 0, 3.7, 0
scale    = 0.7, 0.55, 0.7

[mesh.left_shoulder]
file     = cube.obj
material = dark
offset   = -1.05, 2.7, 0
scale    = 0.55, 0.55, 0.55

[mesh.right_shoulder]
file     = cube.obj
material = dark
offset   = 1.05, 2.7, 0
scale    = 0.55, 0.55, 0.55

[mesh.left_arm]
file     = cube.obj
material = armor
offset   = -1.05, 1.7, 0
scale    = 0.38, 1.4, 0.38

[mesh.right_arm]
file     = cube.obj
material = armor
offset   = 1.05, 1.7, 0
scale    = 0.38, 1.4, 0.38

[mesh.left_leg]
file     = cube.obj
material = armor
offset   = -0.45, 0.75, 0
scale    = 0.5, 1.4, 0.5

[mesh.right_leg]
file     = cube.obj
material = armor
offset   = 0.45, 0.75, 0
scale    = 0.5, 1.4, 0.5

[mesh.left_foot]
file     = cube.obj
material = dark
offset   = -0.45, 0.08, 0.1
scale    = 0.6, 0.15, 0.9

[mesh.right_foot]
file     = cube.obj
material = dark
offset   = 0.45, 0.08, 0.1
scale    = 0.6, 0.15, 0.9
